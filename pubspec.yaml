name: data_caching
description: A new Flutter project.
publish_to: 'none' 
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Flutter packages for UI and theming
  cupertino_icons: ^1.0.2
  flex_color_scheme: ^8.4.0
  google_fonts: ^8.0.2
  iconly: ^1.0.1
  remixicon: ^1.2.0

  # State management and dependency injection
  bloc: ^8.1.2
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  
  # dependency injection
  get_it: ^9.2.1

  # HTTP client and connectivity checker
  dio: ^5.3.2
  connectivity_plus: ^4.0.2

  # Hive packages for local data caching
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  hive_generator: ^2.0.1
  cached_network_image: ^3.3.1

  logger: ^2.2.0

  # For better bottom navigation bar
  crystal_navigation_bar: ^1.0.0
  intl: ^0.19.0

  # For showing alerts and pull to refresh
  alert_banner: ^1.0.1

  # For pull to refresh
  liquid_pull_to_refresh: ^3.0.1 

  # For better error handling and functional programming
  meta: ^1.9.1
  

  # For app icons and splash screens
  flutter_native_splash: ^2.4.7
  flutter_launcher_icons: ^0.14.4

  # Firebase packages for backend services
  firebase_core: ^4.5.0
  cloud_firestore: ^6.1.3
  
dev_dependencies:
  flutter_test:
    sdk: flutter
    
  # generate code for Hive type adapters
  build_runner: ^2.4.4
  

  flutter_lints: ^2.0.0

flutter:

  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/assets-and-images/#resolution-aware

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/assets-and-images/#from-packages

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/custom-fonts/#from-packages